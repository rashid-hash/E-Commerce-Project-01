<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>প্রোডাক্ট ডিটেলস - আমাদের ই-কমার্স শপ</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>
        tailwind.config = {
            theme: { extend: { fontFamily: { sans: ['"Hind Siliguri"', 'sans-serif'], } } }
        }
    </script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

    <header class="bg-white shadow-md sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <a href="index.html" class="text-2xl font-bold text-blue-600">Shop<span class="text-orange-500">Logo</span></a>
            <nav class="hidden md:flex space-x-6 font-medium">
                <a href="index.html" class="hover:text-orange-500 transition">হোম</a>
            </nav>
        </div>
    </header>

    <section class="py-12">
        <div class="container mx-auto px-4">
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 md:p-10 flex flex-col md:flex-row gap-10">
                
                <div class="md:w-1/2">
                    <div id="main-image-container" class="w-full mb-4">
                        <div class="w-full h-80 md:h-96 bg-gray-200 rounded-lg flex items-center justify-center text-gray-400">ইমেজ লোড হচ্ছে...</div>
                    </div>
                    <div id="thumbnails-container" class="flex space-x-4 overflow-x-auto py-2">
                    </div>
                </div>

                <div class="md:w-1/2">
                    <span id="prod-category" class="text-sm text-orange-500 font-semibold uppercase tracking-wider">...</span>
                    <h1 id="prod-name" class="text-3xl font-bold text-gray-800 mt-2 mb-4">লোড হচ্ছে...</h1>
                    
                    <div class="flex items-center space-x-4 mb-4">
                        <span id="prod-price" class="text-3xl font-bold text-blue-600">৳০</span>
                        <span id="prod-old-price" class="text-xl text-gray-400 line-through"></span>
                    </div>

                    <p id="prod-desc" class="text-gray-600 mb-4 leading-relaxed whitespace-pre-wrap">...</p>
                    
                    <div id="video-container" class="mb-6"></div>

                    <hr class="mb-6 border-gray-200">
                    
                    <div class="bg-blue-50 p-6 rounded-lg border border-blue-100">
                        <h3 class="text-lg font-bold text-gray-800 mb-4">অর্ডার করতে নিচের ফর্মটি পূরণ করুন</h3>
                        
                        <form id="order-form">
                            <div class="mb-4">
                                <label class="block text-sm font-medium text-gray-700 mb-1">আপনার নাম *</label>
                                <input type="text" id="customer-name" placeholder="সম্পূর্ণ নাম লিখুন" class="w-full px-4 py-2 border border-gray-300 rounded focus:outline-none focus:border-blue-500" required>
                            </div>
                            <div class="mb-4">
                                <label class="block text-sm font-medium text-gray-700 mb-1">মোবাইল নাম্বার *</label>
                                <input type="tel" id="customer-phone" placeholder="01XXXXXXXXX" class="w-full px-4 py-2 border border-gray-300 rounded focus:outline-none focus:border-blue-500" required>
                            </div>
                            <div class="mb-4">
                                <label class="block text-sm font-medium text-gray-700 mb-1">ডেলিভারি এরিয়া *</label>
                                <select id="delivery-area" class="w-full px-4 py-2 border border-gray-300 rounded focus:outline-none focus:border-blue-500" required>
                                    <option value="" disabled selected>এরিয়া সিলেক্ট করুন</option>
                                    <option value="Dhaka Inside">ঢাকার ভেতরে (ডেলিভারি চার্জ ৳৬০)</option>
                                    <option value="Dhaka Outside">ঢাকার বাইরে (ডেলিভারি চার্জ ৳১২০)</option>
                                </select>
                            </div>
                            <div class="mb-6">
                                <label class="block text-sm font-medium text-gray-700 mb-1">সম্পূর্ণ ঠিকানা *</label>
                                <textarea id="customer-address" rows="2" placeholder="বাসা নং, রাস্তা, এলাকা, জেলা" class="w-full px-4 py-2 border border-gray-300 rounded focus:outline-none focus:border-blue-500" required></textarea>
                            </div>
                            
                            <input type="hidden" id="ordered-product-id" value="">
                            <button type="submit" id="submit-btn" class="w-full bg-orange-500 text-white font-bold text-lg py-3 rounded shadow hover:bg-orange-600 transition">
                                অর্ডার কনফার্ম করুন
                            </button>
                            <p class="text-center text-xs text-gray-500 mt-3">** ক্যাশ অন ডেলিভারি (প্রোডাক্ট হাতে পেয়ে টাকা দিবেন) **</p>
                        </form>
                    </div>

                </div>
            </div>
        </div>
    </section>

    <footer class="bg-gray-900 text-gray-300 py-6 border-t-4 border-blue-600 text-center">
        <p class="text-sm">&copy; ২০২৬ ShopLogo. সর্বস্বত্ব সংরক্ষিত।</p>
    </footer>

    <script type="module">
        import { db, collection, addDoc, doc, getDoc } from './firebase-config.js';

        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');

        async function loadSingleProduct() {
            if(!productId) {
                document.getElementById('prod-name').innerText = "ভুল প্রোডাক্ট লিংক!";
                return;
            }
            try {
                const docRef = doc(db, "products", productId);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    const product = docSnap.data();
                    document.getElementById('prod-category').innerText = product.category;
                    document.getElementById('prod-name').innerText = product.name;
                    document.getElementById('prod-price').innerText = `৳${product.price}`;
                    document.getElementById('prod-old-price').innerText = product.oldPrice ? `৳${product.oldPrice}` : '';
                    document.getElementById('prod-desc').innerText = product.desc;
                    document.getElementById('ordered-product-id').value = productId;

                    const mainImgContainer = document.getElementById('main-image-container');
                    const thumbsContainer = document.getElementById('thumbnails-container');
                    
                    if(product.imgMain) {
                        mainImgContainer.innerHTML = `<img id="current-main-img" src="${product.imgMain}" class="w-full h-80 md:h-96 object-cover rounded-lg shadow-sm border border-slate-200 transition-all duration-300">`;
                    } else {
                        mainImgContainer.innerHTML = `<div class="w-full h-80 md:h-96 bg-slate-100 rounded-lg flex items-center justify-center text-slate-400 border border-slate-200">নো ইমেজ</div>`;
                    }

                    const images = [product.imgMain, product.img2, product.img3].filter(Boolean);
                    let thumbsHtml = '';
                    images.forEach((img) => {
                        thumbsHtml += `<img src="${img}" onclick="document.getElementById('current-main-img').src='${img}'" class="w-20 h-20 object-cover bg-white rounded-lg border-2 border-transparent hover:border-blue-600 cursor-pointer shadow-sm transition">`;
                    });
                    thumbsContainer.innerHTML = thumbsHtml;

                    const videoContainer = document.getElementById('video-container');
                    if(product.videoLink) {
                        videoContainer.innerHTML = `
                            <a href="${product.videoLink}" target="_blank" class="inline-flex items-center gap-2 bg-red-50 text-red-600 px-5 py-2.5 rounded-full font-bold hover:bg-red-100 transition border border-red-200 shadow-sm">
                                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M10 0C4.477 0 0 4.477 0 10s4.477 10 10 10 10-4.477 10-10S15.523 0 10 0zm3.854 10.421l-5.666 3.167A.5.5 0 017.438 13.1V6.764a.5.5 0 01.75-.421l5.666 3.167a.5.5 0 010 .842z"/></svg>
                                প্রোডাক্টের ভিডিও দেখুন
                            </a>`;
                    }
                } else {
                    document.getElementById('prod-name').innerText = "প্রোডাক্টটি খুঁজে পাওয়া যায়নি!";
                }
            } catch (error) {
                console.error("Error: ", error);
                document.getElementById('prod-name').innerText = "সার্ভার এরর!";
            }
        }

        loadSingleProduct();

        const orderForm = document.getElementById('order-form');
        const submitBtn = document.getElementById('submit-btn');

        orderForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            submitBtn.innerText = "অর্ডার প্রসেস হচ্ছে...";
            submitBtn.disabled = true;

            const pName = document.getElementById('prod-name').innerText;
            const pPrice = document.getElementById('prod-price').innerText;
            const cName = document.getElementById('customer-name').value;
            const cPhone = document.getElementById('customer-phone').value;
            const dArea = document.getElementById('delivery-area').value;
            const cAddress = document.getElementById('customer-address').value;

            try {
                await addDoc(collection(db, "orders"), {
                    product_id: document.getElementById('ordered-product-id').value,
                    product_name: pName,
                    price: pPrice,
                    customer_name: cName,
                    customer_phone: cPhone,
                    delivery_area: dArea,
                    customer_address: cAddress,
                    status: "Pending", 
                    order_date: new Date().toISOString()
                });

                try {
                    const tgSettingsRef = doc(db, "settings", "telegram");
                    const tgSnap = await getDoc(tgSettingsRef);
                    if (tgSnap.exists()) {
                        const tgData = tgSnap.data();
                        const botToken = tgData.botToken;
                        const chatId = tgData.chatId;

                        if (botToken && chatId) {
                            const tgMessage = `🛒 *নতুন অর্ডার এসেছে!*\n\n📦 *প্রোডাক্ট:* ${pName}\n💰 *দাম:* ${pPrice}\n\n👤 *কাস্টমার:* ${cName}\n📞 *ফোন:* ${cPhone}\n📍 *ঠিকানা:* ${cAddress}\n🚚 *ডেলিভারি এরিয়া:* ${dArea}`;

                            await fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ chat_id: chatId, text: tgMessage, parse_mode: 'Markdown' })
                            });
                        }
                    }
                } catch (tgError) {
                    console.error("টেলিগ্রাম মেসেজ পাঠাতে সমস্যা:", tgError);
                }

                // SweetAlert Success Message
                Swal.fire({
                    title: 'অর্ডার সফল হয়েছে!',
                    text: 'ধন্যবাদ! খুব শীঘ্রই আমাদের প্রতিনিধি আপনার সাথে যোগাযোগ করবে।',
                    icon: 'success',
                    confirmButtonColor: '#f97316',
                    confirmButtonText: 'ওকে'
                }).then(() => {
                    window.location.href = "index.html";
                });

            } catch (error) {
                console.error("System Error: ", error);
                // SweetAlert Error Message
                Swal.fire({
                    title: 'দুঃখিত!',
                    text: 'কোনো একটি সমস্যা হয়েছে। দয়া করে আবার চেষ্টা করুন।',
                    icon: 'error',
                    confirmButtonColor: '#f97316'
                });
                submitBtn.innerText = "অর্ডার কনফার্ম করুন";
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
